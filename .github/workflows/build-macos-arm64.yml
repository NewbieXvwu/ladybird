name: Build macOS ARM64 (M5 Optimized)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.6.0'

      - name: Install dependencies
        run: |
          brew install autoconf autoconf-archive automake ccache \
            coreutils libtool llvm@21 nasm ninja pkg-config qt unzip wabt

      - name: Set up vcpkg
        run: ./Meta/ladybird.py vcpkg

      - name: Configure with M5 optimization
        run: |
          cmake --preset Release \
            -S . -B Build/release \
            -DCMAKE_C_COMPILER="$(brew --prefix llvm@21)/bin/clang" \
            -DCMAKE_CXX_COMPILER="$(brew --prefix llvm@21)/bin/clang++" \
            -DLADYBIRD_GUI_FRAMEWORK=Qt \
            -DCMAKE_C_FLAGS="-mcpu=apple-m5 -O3" \
            -DCMAKE_CXX_FLAGS="-mcpu=apple-m5 -O3"

      - name: Build
        run: cmake --build Build/release

      - name: Package
        run: |
          cd Build/release/bin
          zip -r ../../../ladybird-macos-arm64.zip Ladybird.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ladybird-macos-arm64
          path: ladybird-macos-arm64.zip
          retention-days: 7
