name: Build macOS ARM64 (M5 Optimized)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.6.0'

      - name: Install dependencies
        run: |
          brew install autoconf autoconf-archive automake ccache \
            coreutils llvm@21 nasm ninja pkg-config qt unzip wabt

      - name: Build Ladybird
        run: |
          export CC="$(brew --prefix llvm@21)/bin/clang"
          export CXX="$(brew --prefix llvm@21)/bin/clang++"
          export CFLAGS="-mcpu=apple-m5 -O3"
          export CXXFLAGS="-mcpu=apple-m5 -O3"
          ./Meta/ladybird.py build ladybird

      - name: Package
        run: |
          cd Build/release/bin
          zip -r ../../../ladybird-macos-arm64.zip Ladybird.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ladybird-macos-arm64
          path: ladybird-macos-arm64.zip
          retention-days: 7
